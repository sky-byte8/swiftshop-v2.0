server:
  port: 8082
  tomcat:
    threads:
      max: 25
    accept-count: 25
    max-connections: 100

feign:
  okhttp:
    enabled: true
  sentinel:
    enabled: true

swift:
  cart:
    max-items: 10
  db:
    database: swift-cart
  swagger:
    title: "SwiftShop购物车服务接口文档"
    package: com.swiftshop.cart.controller

spring:
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8090
      http-method-specify: true
